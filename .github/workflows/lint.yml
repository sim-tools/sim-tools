name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-docs:
    name: "Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Create uv virtualenv
        run: uv venv

      - name: Install package and dependencies
        run: |
          uv pip install --upgrade pip
          uv pip install -e .
          uv pip install --group dev

      - name: Run ruff on .py files
        run: uv run ruff check .

      - name: List available linters
        run: uv run lintquarto list

      - name: Run lintquarto on minimal file
        run: uv run lintquarto -l ruff -p user_guide/index.qmd

      - name: Run lintquarto on minimal file
        run: uv run lintquarto -l ruff -p user_guide/01-sampling/01-distributions_examples.qmd

      - name: Run ruff on .qmd files
        run: uv run lintquarto -v
